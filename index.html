<!DOCTYPE html>
<html>
<head>
<title>Color Betting Game</title>

<style>
body{
background:black;
color:white;
text-align:center;
font-family:Arial;
}

h1{
color:orange;
}

button{
padding:10px 20px;
margin:5px;
border:none;
border-radius:8px;
font-size:16px;
}

.red{background:red;color:white;}
.green{background:green;color:white;}
.violet{background:purple;color:white;}
.bet{background:orange;color:black;}

#history div{
margin:5px;
padding:5px;
background:#222;
border-radius:5px;
}

</style>
</head>

<body>

<h1>Color Betting Game</h1>

<h2>Balance: ₹<span id="balance">1000</span></h2>

<h2>Timer: <span id="timer">30</span></h2>

<h3>Select Bet Amount</h3>

<button class="bet" onclick="setBet(10)">₹10</button>
<button class="bet" onclick="setBet(50)">₹50</button>
<button class="bet" onclick="setBet(100)">₹100</button>

<h3>Choose Color</h3>

<button class="red" onclick="placeBet('red')">Red</button>
<button class="green" onclick="placeBet('green')">Green</button>
<button class="violet" onclick="placeBet('violet')">Violet</button>

<h3 id="msg"></h3>

<h3>Game History</h3>

<div id="history"></div>

<script>

let balance = 1000;
let betAmount = 0;
let betColor = "";
let timer = 30;

function setBet(amount){
betAmount = amount;
document.getElementById("msg").innerText = "Bet Amount ₹"+amount;
}

function placeBet(color){

if(betAmount==0){
alert("Select Bet Amount");
return;
}

betColor = color;

document.getElementById("msg").innerText =
"Bet placed on "+color;

}

setInterval(function(){

timer--;
document.getElementById("timer").innerText = timer;

if(timer==0){

timer=30;

let colors=["red","green","violet"];
let result=colors[Math.floor(Math.random()*3)];

let history=document.getElementById("history");

let div=document.createElement("div");
div.innerText="Result: "+result;
history.prepend(div);

if(result==betColor){

balance+=betAmount;

document.getElementById("msg").innerText="🎉 You Win";

}else if(betColor!=""){

balance-=betAmount;

document.getElementById("msg").innerText="❌ You Lose";

}

document.getElementById("balance").innerText=balance;

betColor="";
}

},1000);

</script>

</body>
</html>
